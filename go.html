  <style>
  :root{--black:#080808;--dark:#101010;--card:#141414;--card2:#1a1a1a;--orange:#E8570A;--orange-dim:#c44a08;--gold:#C9A84C;--white:#f2ede6;--off-white:#d4cfc7;--gray:#7a7870;--light-gray:#b8b4ac;--border:#222220;--border-light:#2e2e2c;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;overflow-x:hidden;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .fu{opacity:0;animation:fadeUp 0.6s ease forwards;}
  .d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.35s}.d4{animation-delay:.5s}.d5{animation-delay:.65s}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(8,8,8,0.96);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(8px);}
  .nav-brand{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:0.04em;color:var(--white);text-decoration:none;}
  .nav-brand span{color:var(--orange);}
  .nav-lic{font-size:11px;color:var(--gray);}
  .hero{padding:88px 24px 48px;max-width:700px;margin:0 auto;text-align:center;}
  .hero-eyebrow{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.12em;color:var(--orange);text-transform:uppercase;border:1px solid var(--orange);border-radius:2px;padding:5px 14px;margin-bottom:20px;}
  .hero h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(42px,9vw,70px);font-weight:900;line-height:0.93;text-transform:uppercase;letter-spacing:0.01em;color:var(--white);margin-bottom:16px;}
  .hero h1 .accent{color:var(--orange);}
  .hero h1 .gold{color:var(--gold);}
  .hero-sub{font-size:16px;color:var(--off-white);line-height:1.65;margin-bottom:14px;max-width:560px;margin-left:auto;margin-right:auto;}
  .hero-audiences{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;}
  .audience-tag{font-size:12px;font-weight:600;color:var(--light-gray);background:var(--card);border:1px solid var(--border-light);border-radius:20px;padding:5px 14px;}
  .proof-bar{background:var(--card);border:1px solid var(--border-light);border-radius:8px;padding:14px 20px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:32px;}
  .proof-dot{width:5px;height:5px;background:var(--orange);border-radius:50%;flex-shrink:0;}
  .proof-text{font-size:13px;color:var(--light-gray);}
  .proof-text strong{color:var(--white);}
  .benefits{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:40px;text-align:left;}
  .benefit-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;display:flex;align-items:flex-start;gap:10px;}
  .benefit-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
  .benefit-title{font-size:13px;font-weight:700;color:var(--white);margin-bottom:2px;}
  .benefit-desc{font-size:11px;color:var(--gray);line-height:1.4;}
